    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Global scoped app engines
        let db;
        let rtcClient = null;
        let audioCtx;
        let analyser;
        let source;
        let animationFrameId;
        let isAgoraLive = false;
        let counterIntervalId = null;

        // Fetch UI Elements securely from DOM
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const programBanner = document.getElementById('program-banner');
        const archivePlayer = document.getElementById('archive-player');
        const joinBtn = document.getElementById('join-btn');
        const leaveBtn = document.getElementById('leave-btn');
        const statusBadge = document.getElementById('status-badge');
        const liveIndicator = document.getElementById('live-indicator');
        const canvas = document.getElementById('visualizer-canvas');
        const ctx = canvas.getContext('2d');
        const fallbackText = document.getElementById('visualizer-fallback');
        const badgeContainer = document.getElementById('listener-counter-badge');
        const counterElement = document.getElementById('listener-count');
        
        // Anonymous Features Interactive Selectors
        const anonToggle = document.getElementById('anonymous-toggle');
        const usernameInput = document.getElementById('username');

        // Config credentials
        const AGORA_APP_ID = import.meta.env.VITE_AGORA_APP_ID; 
        const CHANNEL_NAME = import.meta.env.VITE_AGORA_CHANNEL_NAME; 
        const STREAM_TOKEN = import.meta.env.VITE_AGORA_STREAM_TOKEN;

        // ==========================================
        // 🎵 CONTINUOUS RADIO SYNC PLAYLIST SYSTEM
        // ==========================================
        const radioPlaylist = [
            { src: "https://ik.imagekit.io/RealPaddi/mnikjlm.mp3?updatedAt=1781720055074" },
            { src: "https://ik.imagekit.io/RealPaddi/updates%20pst%20ben.mp3?updatedAt=1782037041748" },
            { src: "https://ik.imagekit.io/RealPaddi/choir%20ministration%20drama.mp3?updatedAt=1781544498226" },
            { src: "https://ik.imagekit.io/RealPaddi/bro%20ay%203.mp3" },
            { src: "https://ik.imagekit.io/RealPaddi/bro%20ay%202%20mini.mp3" },
            { src: "https://ik.imagekit.io/RealPaddi/choir%20ministartion.mp3?updatedAt=1781544321920" },
            { src: "https://ik.imagekit.io/RealPaddi/Bro%20ay%20(mp3.)praise%20and%20worship.mp3?updatedAt=1782037168147" },
            { src: "https://ik.imagekit.io/RealPaddi/PST%20Ben%2008.mp3?updatedAt=1781544756829" },
            { src: "https://ik.imagekit.io/RealPaddi/pst%20ben.mp3?updatedAt=1781544812674" },
            { src: "https://ik.imagekit.io/RealPaddi/State%20Coordinator%20Ministration.mp3?updatedAt=1781544140948" }
        ];
        
        const BROADCAST_EPOCH = new Date("2026-01-01T00:00:00Z").getTime();
        let TOTAL_PLAYLIST_DURATION = 0;

        async function loadPlaylistDurations() {
            console.log("Syncing radio timeline lengths...");
            for (let track of radioPlaylist) {
                try {
                    track.duration = await new Promise((resolve) => {
                        const tempAudio = new Audio(track.src);
                        tempAudio.preload = "metadata";
                        tempAudio.addEventListener("loadedmetadata", () => {
                            resolve(Math.ceil(tempAudio.duration));
                        });
                        tempAudio.addEventListener("error", () => {
                            resolve(180);
                        });
                    });
                } catch (e) {
                    track.duration = 180;
                }
            }
            
            TOTAL_PLAYLIST_DURATION = radioPlaylist.reduce((total, track) => total + track.duration, 0);
            console.log(`Total loop calculation loaded: ${TOTAL_PLAYLIST_DURATION}s.`);
            syncRadioPlayback();
        }

        function syncRadioPlayback() {
            if (TOTAL_PLAYLIST_DURATION === 0 || radioPlaylist.length === 0 || isAgoraLive) return;

            const totalElapsedSeconds = Math.floor((Date.now() - BROADCAST_EPOCH) / 1000);
            const currentCycleRemainder = totalElapsedSeconds % TOTAL_PLAYLIST_DURATION;
            
            let accumulatedTime = 0;
            let currentTrackIdx = 0;
            let targetedTrackTimestamp = 0;

            for (let i = 0; i < radioPlaylist.length; i++) {
                if (currentCycleRemainder >= accumulatedTime && currentCycleRemainder < accumulatedTime + radioPlaylist[i].duration) {
                    currentTrackIdx = i;
                    targetedTrackTimestamp = currentCycleRemainder - accumulatedTime;
                    break;
                }
                accumulatedTime += radioPlaylist[i].duration;
            }

            const currentTrack = radioPlaylist[currentTrackIdx];

            if (archivePlayer.src !== currentTrack.src) {
                archivePlayer.src = currentTrack.src;
                archivePlayer.load();
            }

            if (Math.abs(archivePlayer.currentTime - targetedTrackTimestamp) > 2) {
                archivePlayer.currentTime = targetedTrackTimestamp;
            }
            
            if (joinBtn && joinBtn.classList.contains('hidden') && !isAgoraLive) {
                archivePlayer.play().catch(e => console.log("Audio playback user gesture catchup deferred."));
            }
        }

        // ==========================================
        // 🛠️ SAFELY INITIALIZE ENTIRE WEB APP ON LOAD
        // ==========================================
        function initAppEngine() {
            try {
                // Initialize Anonymous Mode Toggle Behavior Switcher
                if (anonToggle && usernameInput) {
                    anonToggle.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            usernameInput.value = "Anonymous";
                            usernameInput.disabled = true;
                            usernameInput.removeAttribute('required');
                        } else {
                            usernameInput.value = "";
                            usernameInput.disabled = false;
                            usernameInput.setAttribute('required', '');
                        }
                    });
                }

                const firebaseConfig = {
                    apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
                    authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
                    projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
                    storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
                    messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
                    appId: import.meta.env.VITE_FIREBASE_APP_ID
                };
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);

                if (typeof AgoraRTC !== "undefined") {
                    rtcClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                } else {
                    console.error("Agora Web SDK missing or blocked by extension.");
                }

                if (joinBtn) joinBtn.addEventListener('click', joinStream);
                if (leaveBtn) leaveBtn.addEventListener('click', leaveStream);
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                loadPlaylistDurations();
                archivePlayer.addEventListener('ended', () => {
                    if (!isAgoraLive) syncRadioPlayback();
                });

                setupFirebaseListeners();

            } catch (err) {
                console.error("Critical Runtime System Breakout:", err);
            }
        }

        function setupFirebaseListeners() {
            if (!db) return;

            onSnapshot(doc(db, "banners", "current"), (docSnap) => {
                if (docSnap.exists() && programBanner) {
                    const data = docSnap.data();
                    if (data["bible study"]) programBanner.src = data["bible study"];
                }
            });

            const q = query(collection(db, "chat"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                if (!chatBox) return;
                chatBox.innerHTML = '';
                if (snapshot.empty) {
                    chatBox.innerHTML = `<div class="text-slate-400/50 text-center italic pt-12 px-4 leading-relaxed text-[10.5px]">You are tuned into MFMCF UNIOSUN CAMPUS Radio, broadcasting live 24/7 from the heart of our campus. Whether you are studying, relaxing, or walking to class, we are here to fuel your faith and connect you to a vibrant community of young believers. Stay locked in for uplifting worship, transformative word sessions, and authentic student conversations. This is your campus spiritual home, online every hour of every day.</div>`;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const msgEl = document.createElement('div');
                    msgEl.className = "bg-white/[0.03] px-3.5 py-2.5 rounded-xl border border-white/[0.05] leading-relaxed text-slate-300 shadow-sm max-w-[95%] mb-1 break-words transition-all hover:bg-white/[0.05]";
                    msgEl.innerHTML = `<span class="font-extrabold text-purple-400 tracking-wide">${data.user || 'Anonymous'}</span> <span class="text-white/95 ml-1.5">${data.text}</span>`;
                    chatBox.appendChild(msgEl);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        if (chatForm) {
            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const uInput = document.getElementById('username');
                const mInput = document.getElementById('message');
                if (!uInput || !mInput || !db) return;
                try {
                    let finalUser = uInput.value.trim();
                    if (anonToggle && anonToggle.checked) {
                        finalUser = "Anonymous";
                    }
                    await addDoc(collection(db, "chat"), { user: finalUser, text: mInput.value.trim(), timestamp: new Date() });
                    mInput.value = '';
                    chatBox.scrollTop = chatBox.scrollHeight;
                } catch(err) { console.error(err); }
            });
        }

        function resizeCanvas() {
            if (canvas && canvas.parentElement) {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
        }

        function startVisualizer(streamSource) {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (audioCtx) audioCtx.close().catch(() => {});

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            
            if (streamSource instanceof MediaStreamTrack) {
                const nativeStream = new MediaStream([streamSource]);
                source = audioCtx.createMediaStreamSource(nativeStream);
            } else {
                source = audioCtx.createMediaStreamSource(streamSource);
            }
            
            source.connect(analyser);
            analyser.fftSize = 64;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function drawWaveform() {
                animationFrameId = requestAnimationFrame(drawWaveform);
                analyser.getByteFrequencyData(dataArray);
                if (!ctx || !canvas) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 1.8;
                let barHeight;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] * 0.45;
                    ctx.fillStyle = `rgba(168, 85, 247, ${barHeight / 110})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                    x += barWidth;
                }
            }
            drawWaveform();
            if (fallbackText) fallbackText.innerText = "STREAM WAVEFORM ACTIVE";
        }

        function startTrackingListeners() {
            if (counterIntervalId) clearInterval(counterIntervalId);
            if (!badgeContainer || !counterElement || !rtcClient) return;
            
            badgeContainer.classList.remove('hidden');
            badgeContainer.classList.add('flex');
            
            counterIntervalId = setInterval(async () => {
                try {
                    const stats = rtcClient.getRTCStats();
                    const totalActiveListeners = (stats.UserCount || 0) + 1;
                    counterElement.innerText = `${totalActiveListeners} Listening`;
                } catch (e) {
                    console.log("Telemetry aggregation loop refresh buffered.");
                }
            }, 3000);
        }

        function stopTrackingListeners() {
            if (counterIntervalId) {
                clearInterval(counterIntervalId);
                counterIntervalId = null;
            }
            if (badgeContainer) {
                badgeContainer.classList.remove('flex');
                badgeContainer.classList.add('hidden');
            }
        }

        async function joinStream() {
            if (!rtcClient) return;
            try {
                joinBtn.disabled = true;
                joinBtn.innerText = "Connecting...";
                joinBtn.className = "w-full bg-slate-800 text-slate-400 font-extrabold py-4 px-4 rounded-xl tracking-widest text-xs shadow-md flex items-center justify-center gap-2 uppercase border border-white/[0.05] cursor-not-allowed";

                if (statusBadge) statusBadge.innerText = "CONNECTING...";

                await rtcClient.join(AGORA_APP_ID, CHANNEL_NAME, STREAM_TOKEN, null);
                startTrackingListeners();
                
                rtcClient.on("user-published", async (user, mediaType) => {
                    await rtcClient.subscribe(user, mediaType);
                    if (mediaType === "audio") {
                        isAgoraLive = true;
                        if (archivePlayer) archivePlayer.pause(); 
                        user.audioTrack.play(); 
                        startVisualizer(user.audioTrack.getMediaStreamTrack());
                        
                        if (statusBadge) {
                            statusBadge.innerText = "LIVE SERVICE";
                            statusBadge.className = "text-[9px] font-black tracking-widest text-emerald-400 uppercase";
                        }
                        if (liveIndicator) liveIndicator.className = "w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_8px_#34d399] animate-ping";
                    }
                });

                rtcClient.on("user-unpublished", (user, mediaType) => {
                    if (mediaType === "audio") {
                        isAgoraLive = false;
                        syncRadioPlayback();
                        if (animationFrameId) cancelAnimationFrame(animationFrameId);
                        if (ctx && canvas) ctx.clearRect(0, 0, canvas.width, canvas.height);
                        if (fallbackText) fallbackText.innerText = "24/7 STREAM ACTIVE";
                        
                        if (statusBadge) {
                            statusBadge.innerText = "24/7 RADIO";
                            statusBadge.className = "text-[9px] font-black tracking-widest text-purple-400 uppercase";
                        }
                        if (liveIndicator) liveIndicator.className = "w-2 h-2 bg-purple-400 rounded-full shadow-[0_0_8px_#c084fc] animate-pulse";
                    }
                });

                setTimeout(() => {
                    if (!isAgoraLive) {
                        syncRadioPlayback();
                        if (animationFrameId) cancelAnimationFrame(animationFrameId);
                        if (ctx && canvas) ctx.clearRect(0, 0, canvas.width, canvas.height);
                        if (fallbackText) fallbackText.innerText = "24/7 STREAM ACTIVE";
                        
                        if (statusBadge) {
                            statusBadge.innerText = "24/7 RADIO";
                            statusBadge.className = "text-[9px] font-black tracking-widest text-purple-400 uppercase";
                        }
                        if (liveIndicator) liveIndicator.className = "w-2 h-2 bg-purple-400 rounded-full shadow-[0_0_8px_#c084fc] animate-pulse";
                    }
                }, 2200);

                if (joinBtn) joinBtn.classList.add('hidden');
                if (leaveBtn) leaveBtn.classList.remove('hidden');
            } catch (error) {
                console.error("Connection Error:", error);
                if (statusBadge) statusBadge.innerText = "OFF-AIR";
                stopTrackingListeners();
                if (joinBtn) {
                    joinBtn.disabled = false;
                    joinBtn.innerText = "Listen Live";
                    joinBtn.className = "w-full bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 hover:from-purple-500 hover:via-indigo-500 hover:to-blue-500 text-white font-extrabold py-4 px-4 rounded-xl transition-all tracking-widest text-xs shadow-lg cursor-pointer flex items-center justify-center gap-2 uppercase border border-purple-500/20";
                }
            }
        }

        async function leaveStream() {
            if (!rtcClient) return;
            stopTrackingListeners();
            await rtcClient.leave();
            if (archivePlayer) archivePlayer.pause();
            isAgoraLive = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (audioCtx) audioCtx.close().catch(() => {});
            if (ctx && canvas) ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (joinBtn) {
                joinBtn.disabled = false;
                joinBtn.innerText = "Listen Live";
                joinBtn.className = "w-full bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 hover:from-purple-500 hover:via-indigo-500 hover:to-blue-500 text-white font-extrabold py-4 px-4 rounded-xl transition-all tracking-widest text-xs shadow-lg cursor-pointer flex items-center justify-center gap-2 uppercase border border-purple-500/20";
                joinBtn.classList.remove('hidden');
            }
            if (leaveBtn) leaveBtn.classList.add('hidden');
            if (statusBadge) {
                statusBadge.innerText = "OFF-AIR";
                statusBadge.className = "text-[9px] font-black tracking-widest text-slate-400 uppercase";
            }
            if (liveIndicator) liveIndicator.className = "w-2 h-2 bg-slate-500 rounded-full shadow-none";
            if (fallbackText) fallbackText.innerText = "WAVEFORM INACTIVE";
        }

        initAppEngine();
    </script>
</body>
</html>
